<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#1B2A41" />
    <meta
      name="description"
      content="BANTAYOG ALERT - Real-time hazard and disaster reporting for Camarines Norte"
    />

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="BANTAYOG ALERT" />
    <meta
      property="og:description"
      content="Real-time hazard and disaster reporting for Camarines Norte, Philippines"
    />
    <meta property="og:image" content="/icons/icon-512x512.png" />
    <meta property="og:locale" content="en_PH" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary" />
    <meta name="twitter:title" content="BANTAYOG ALERT" />
    <meta
      name="twitter:description"
      content="Real-time hazard and disaster reporting for Camarines Norte, Philippines"
    />
    <meta name="twitter:image" content="/icons/icon-512x512.png" />

    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32.png" />
    <link rel="manifest" href="/manifest.json" />
    <link rel="apple-touch-icon" href="/icons/icon-192x192.png" />

    <!-- Preconnect to critical third-party origins (max 3 for initial page load) -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="preconnect" href="https://firestore.googleapis.com" />

    <!-- DNS prefetch for resources loaded after initial render -->
    <link rel="dns-prefetch" href="https://a.tile.openstreetmap.org" />
    <link rel="dns-prefetch" href="https://b.tile.openstreetmap.org" />
    <link rel="dns-prefetch" href="https://c.tile.openstreetmap.org" />
    <link rel="dns-prefetch" href="https://cdnjs.cloudflare.com" />
    <link rel="dns-prefetch" href="https://api.openweathermap.org" />
    <link rel="dns-prefetch" href="https://firebase.googleapis.com" />

    <!-- Preload critical fonts with font-display: swap -->
    <link
      rel="preload"
      href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=Atkinson+Hyperlegible:wght@400;700&display=swap"
      as="style"
    />

    <!-- Font stylesheet: preload hint above ensures it is fetched early; rel=stylesheet here is CSP-safe -->
    <link
      href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=Atkinson+Hyperlegible:wght@400;700&display=swap"
      rel="stylesheet"
    />
    <title>BANTAYOG ALERT</title>
    <style>
      /* Critical CSS for FCP optimization background */
      body {
        background-color: #F4F1EC;
      }
    </style>
  </head>
  <body class="bg-bg font-sans text-text">
    <div id="root"></div>
    <script defer type="module" src="/src/main.jsx"></script>
  </body>
</html>
