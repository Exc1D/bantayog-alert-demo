name: Deploy to Firebase Hosting

on:
  push:
    branches:
      - main
      - master

jobs:
  deploy:
    name: Deploy to Production
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Setup production environment
        run: |
          echo "=== Using .env.production for build ==="
          cp .env.production .env
          echo "Environment copied successfully"

      - name: Build project
        run: npm run build

      - name: Check Firebase token
        id: check-token
        run: |
          if [ -z "${{ secrets.FIREBASE_TOKEN }}" ]; then
            echo "has_token=false" >> $GITHUB_OUTPUT
            echo "⚠️ FIREBASE_TOKEN not configured. Skipping deployment."
          else
            echo "has_token=true" >> $GITHUB_OUTPUT
          fi

      - name: Install Firebase CLI
        if: steps.check-token.outputs.has_token == 'true'
        run: npm install -g firebase-tools@13

      - name: Deploy to Firebase Hosting
        if: steps.check-token.outputs.has_token == 'true'
        env:
          FIREBASE_TOKEN: ${{ secrets.FIREBASE_TOKEN }}
        run: firebase deploy --only hosting --token "$FIREBASE_TOKEN"

      - name: Get Deployment URL
        if: steps.check-token.outputs.has_token == 'true'
        id: deploy-url
        run: |
          PROJECT_ID=$(cat .firebaserc | jq -r '.projects.default')
          echo "url=https://${PROJECT_ID}.web.app" >> $GITHUB_OUTPUT
          echo "alt_url=https://${PROJECT_ID}.firebaseapp.com" >> $GITHUB_OUTPUT

      - name: Comment on PR
        if: steps.check-token.outputs.has_token == 'true' && github.event_name == 'push' && github.event.before != '0000000000000000000000000000000000000000'
        uses: actions/github-script@v8
        with:
          script: |
            const { data: prs } = await github.rest.pulls.list({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              head: `${context.repo.owner}:${context.ref.replace('refs/heads/', '')}`
            });

            if (prs.length > 0) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: prs[0].number,
                body: `## 🚀 Deployment Successful!\n\nThe changes have been deployed to Firebase Hosting.\n\n**Live URL:** ${{ steps.deploy-url.outputs.url }}\n**Alternative URL:** ${{ steps.deploy-url.outputs.alt_url }}`
              });
            }
