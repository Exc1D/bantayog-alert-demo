name: Deploy to Firebase Hosting

on:
  push:
    branches:
      - main
      - master

jobs:
  deploy:
    name: Deploy to Production
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Check for .env.production
        run: |
          echo "=== Checking for .env.production file ==="
          if [ -f ".env.production" ]; then
            echo "FOUND .env.production - contents:"
            cat .env.production
          else
            echo ".env.production NOT FOUND"
          fi

      - name: Remove .env.production to prevent placeholder override
        run: rm -f .env.production

      - name: Debug env vars
        env:
          FIREBASE_KEY: ${{ secrets.VITE_FIREBASE_API_KEY }}
          OW_KEY: ${{ secrets.VITE_OPENWEATHER_API_KEY }}
        run: |
          echo "FIREBASE_KEY length: ${#FIREBASE_KEY}"
          echo "OW_KEY length: ${#OW_KEY}"
          echo "FIREBASE_KEY prefix: ${FIREBASE_KEY:0:10}"
          echo "OW_KEY prefix: ${OW_KEY:0:10}"

      - name: Build project
        env:
          VITE_APP_ENV: production
          VITE_FIREBASE_API_KEY: ${{ secrets.VITE_FIREBASE_API_KEY }}
          VITE_FIREBASE_AUTH_DOMAIN: ${{ secrets.VITE_FIREBASE_AUTH_DOMAIN }}
          VITE_FIREBASE_PROJECT_ID: ${{ secrets.VITE_FIREBASE_PROJECT_ID }}
          VITE_FIREBASE_STORAGE_BUCKET: ${{ secrets.VITE_FIREBASE_STORAGE_BUCKET }}
          VITE_FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.VITE_FIREBASE_MESSAGING_SENDER_ID }}
          VITE_FIREBASE_APP_ID: ${{ secrets.VITE_FIREBASE_APP_ID }}
          VITE_FIREBASE_MEASUREMENT_ID: ${{ secrets.VITE_FIREBASE_MEASUREMENT_ID }}
          VITE_FIREBASE_VAPID_KEY: ${{ secrets.VITE_FIREBASE_VAPID_KEY }}
          VITE_OPENWEATHER_API_KEY: ${{ secrets.VITE_OPENWEATHER_API_KEY }}
          VITE_SENTRY_DSN: ${{ secrets.VITE_SENTRY_DSN }}
        run: npm run build

      - name: Check Firebase token
        id: check-token
        run: |
          if [ -z "${{ secrets.FIREBASE_TOKEN }}" ]; then
            echo "has_token=false" >> $GITHUB_OUTPUT
            echo "⚠️ FIREBASE_TOKEN not configured. Skipping deployment."
          else
            echo "has_token=true" >> $GITHUB_OUTPUT
          fi

      - name: Install Firebase CLI
        if: steps.check-token.outputs.has_token == 'true'
        run: npm install -g firebase-tools@13

      - name: Deploy to Firebase Hosting
        if: steps.check-token.outputs.has_token == 'true'
        env:
          FIREBASE_TOKEN: ${{ secrets.FIREBASE_TOKEN }}
        run: firebase deploy --only hosting --token "$FIREBASE_TOKEN"

      - name: Get Deployment URL
        if: steps.check-token.outputs.has_token == 'true'
        id: deploy-url
        run: |
          PROJECT_ID=$(cat .firebaserc | jq -r '.projects.default')
          echo "url=https://${PROJECT_ID}.web.app" >> $GITHUB_OUTPUT
          echo "alt_url=https://${PROJECT_ID}.firebaseapp.com" >> $GITHUB_OUTPUT

      - name: Comment on PR
        if: steps.check-token.outputs.has_token == 'true' && github.event_name == 'push' && github.event.before != '0000000000000000000000000000000000000000'
        uses: actions/github-script@v8
        with:
          script: |
            const { data: prs } = await github.rest.pulls.list({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              head: `${context.repo.owner}:${context.ref.replace('refs/heads/', '')}`
            });

            if (prs.length > 0) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: prs[0].number,
                body: `## 🚀 Deployment Successful!\n\nThe changes have been deployed to Firebase Hosting.\n\n**Live URL:** ${{ steps.deploy-url.outputs.url }}\n**Alternative URL:** ${{ steps.deploy-url.outputs.alt_url }}`
              });
            }
